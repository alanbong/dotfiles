# Reference: https://github.com/i3/i3/blob/next/etc/config

config-version = 2

start-at-login = true

# In i3, all workspaces are phantom
persistent-workspaces = []

# i3 doesn't have "normalizations" feature that why we disable them here.
# But the feature is very helpful.
# Normalizations eliminate all sorts of weird tree configurations that don't make sense.
# Give normalizations a chance and enable them back.
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = true


# startup commands
after-startup-command = [
    'exec-and-forget /opt/homebrew/bin/borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=3.0',
    # 'exec-and-forget sketchybar'
]

# workspace change trigger
exec-on-workspace-change = [
    '/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
6 = ['secondary', 'main']
7 = ['secondary', 'main']
8 = ['secondary', 'main']

[mode.main.binding]
    # workspaces
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'

    # switch to workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'


    alt-e = 'layout tiles horizontal vertical'

    # open terminal
    alt-enter = '''exec-and-forget osascript -e '
        tell application "Terminal"
            do script
            activate
        end tell'
    '''

    # kill focused window
    alt-shift-q = 'close'
    
    # start raycast (a program launcher)
    alt-d = "exec-and-forget open -a 'Spotlight'"

    # next/prev workspace
    alt-ctrl-l = 'workspace next'
    alt-ctrl-h = 'workspace prev'
    
    # change focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # alternative change focus
    alt-left = 'focus left'
    alt-down = 'focus down'
    alt-up = 'focus up'
    alt-right = 'focus right'

    # move focused window
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # alternative move focused window
    alt-shift-left = 'move left'
    alt-shift-down = 'move down'
    alt-shift-up = 'move up'
    alt-shift-right = 'move right'

    # split in orientation
    alt-z = 'split vertical'
    alt-v = 'split horizontal'

    # fullscreen container
    alt-f = 'fullscreen'

    # change container layout (stacked, tabbed, toggle split)
    alt-s = 'layout v_accordion'     # Аналог stacking
    alt-w = 'layout h_accordion'     # Аналог tabbed

    # toggle tiling / floating
    alt-shift-space = 'layout floating tiling'
    
    # no support in aerospace yet
    ## change focus between tiling / floating windows
    #bindsym $mod+space focus mode_toggle
    #
    ## focus the parent container
    #bindsym $mod+a focus parent
    #
    ## focus the child container
    #bindsym $mod+d focus child


    # reload the configuration file
    alt-shift-c = 'reload-config'

    # take screenshot 
    alt-shift-s = 'exec-and-forget screencapture -i -c'

    # resize mode
    alt-r = 'mode resize'

# Режим Resize
[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'

[gaps]
inner.horizontal = 5
inner.vertical   = 5
outer.left       = 5
outer.bottom     = 5
outer.right      = 5
outer.top        = [{ monitor.secondary = 40 }, 5]

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'org.tigase.messenger.BeagleIM'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 4'
